# New-API 高可用部署（生产机 ${PROD_IP}）
# 启动: docker compose up -d
# 滚动升级: docker compose up -d --no-deps new-api-1 && sleep 8 && docker compose up -d --no-deps new-api-2

services:
  # === 负载均衡 ===
  nginx:
    image: nginx:alpine
    container_name: new-api-lb
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - new-api-1
      - new-api-2

  # === 两个 new-api 实例 ===
  new-api-1:
    image: ${REGISTRY}/new-api:latest
    container_name: new-api-1
    restart: always
    # 给 Go 进程足够时间优雅关闭（main.go 中 SHUTDOWN_TIMEOUT_SECONDS 默认 120s）
    stop_grace_period: 130s
    volumes:
      - ./data-1:/data
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - SQL_DSN=postgresql://${SQL_USER}:${SQL_PASSWORD}@${SQL_HOST}:${SQL_PORT}/${SQL_DB}
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}
      - TZ=Asia/Shanghai
    depends_on:
      - postgres
      - redis

  new-api-2:
    image: ${REGISTRY}/new-api:latest
    container_name: new-api-2
    restart: always
    stop_grace_period: 130s
    volumes:
      - ./data-2:/data
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - SQL_DSN=postgresql://${SQL_USER}:${SQL_PASSWORD}@${SQL_HOST}:${SQL_PORT}/${SQL_DB}
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}
      - TZ=Asia/Shanghai
    depends_on:
      - postgres
      - redis

  # === 共享组件 ===
  postgres:
    image: postgres:15-alpine
    container_name: new-api-db
    restart: always
    environment:
      POSTGRES_USER: ${SQL_USER}
      POSTGRES_PASSWORD: ${SQL_PASSWORD}
      POSTGRES_DB: ${SQL_DB}
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: new-api-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redisdata:/data
