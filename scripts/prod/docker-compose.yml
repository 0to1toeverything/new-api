# New-API 高可用部署（生产机 192.168.6.114）
# 启动: docker compose up -d
# 滚动升级: docker compose up -d --no-deps new-api-1 && sleep 5 && docker compose up -d --no-deps new-api-2

services:
  # === 负载均衡 ===
  nginx:
    image: nginx:alpine
    container_name: new-api-lb
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - new-api-1
      - new-api-2

  # === 两个 new-api 实例 ===
  new-api-1:
    image: 192.168.6.247:5000/new-api:latest
    container_name: new-api-1
    restart: always
    volumes:
      - ./data-1:/data
    environment:
      - SESSION_SECRET=5a08b3f12f9794abd4d0fa643befcf6b2e108e8714677d7a3333ead420a45744
      - SQL_DSN=postgresql://newapi:adaf5c94692108bc@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://:b6211fe8612954a2@redis:6379
      - TZ=Asia/Shanghai
    depends_on:
      - postgres
      - redis

  new-api-2:
    image: 192.168.6.247:5000/new-api:latest
    container_name: new-api-2
    restart: always
    volumes:
      - ./data-2:/data
    environment:
      - SESSION_SECRET=5a08b3f12f9794abd4d0fa643befcf6b2e108e8714677d7a3333ead420a45744
      - SQL_DSN=postgresql://newapi:adaf5c94692108bc@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://:b6211fe8612954a2@redis:6379
      - TZ=Asia/Shanghai
    depends_on:
      - postgres
      - redis

  # === 共享组件 ===
  postgres:
    image: postgres:15-alpine
    container_name: new-api-db
    restart: always
    environment:
      POSTGRES_USER: newapi
      POSTGRES_PASSWORD: adaf5c94692108bc
      POSTGRES_DB: new-api
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: new-api-redis
    restart: always
    command: redis-server --requirepass b6211fe8612954a2
    volumes:
      - ./redisdata:/data
